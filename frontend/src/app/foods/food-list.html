<h1>Food Catalogue</h1>

<a routerLink="/foods/new">Add Food</a>

<div>
	<input 
		type="text"
		placeholder="Search food name"
		[(ngModel)]="searchText"	
	/>
	<button type="button" (click)="applyQuery()">Search</button>
</div>

<div>
	<input 
		type="text"
		placeholder="Category"
		[(ngModel)]="category"
	>

	<input 
		type="number"
		placeholder="Max calories"
		[(ngModel)]="maxCalories"
	>

	<button type="button" (click)="applyQuery()">Filter</button>
</div>

<div>
	<select [(ngModel)]="sortBy">
		<option value="name">Name</option>
		<option value="category">Category</option>
		<option value="calories">Calories</option>
		<option value="price">Price</option>
	</select>

	<select [(ngModel)]="direction">
		<option value="asc">Ascending</option>
		<option value="desc">Descending</option>
	</select>

	<button type="button" (click)="applyQuery()">Sort</button>
</div>

@if (loading()) {
	<p>Loading foods...</p>
} @else if (error()) {
	<p class="error">{{ error() }}</p>
} @else {
	<p>Total Foods: {{ foods().length }}</p>

	@for (food of foods(); track food.id) {
		<app-food-card 
			[food]="food"
			(deleteFood)="deleteFood($event)"
		/>
	}
}
